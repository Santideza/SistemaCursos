services:
  - type: web
    name: sistemacursos
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:${PORT}
      - key: ConnectionStrings__DefaultConnection
        value: DataSource=/var/data/app.db;Cache=Shared
      - key: Redis__ConnectionString
        sync: false
